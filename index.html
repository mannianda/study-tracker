<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>学习计时器</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,sans-serif; }
    body { background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; padding:12px; color:#333; }
    .container { max-width:480px; margin:0 auto; }
    .card { background:white; border-radius:16px; padding:20px; box-shadow:0 8px 30px rgba(0,0,0,0.08); margin-bottom:16px; text-align:center; }
    .timer-display { font-size:48px; font-weight:700; color:#2c3e50; margin:12px 0; font-family:monospace; }
    .btn { padding:14px 28px; font-size:16px; font-weight:600; border:none; border-radius:50px; cursor:pointer; min-width:120px; }
    .btn-start { background:#2ecc71; color:white; }
    .btn-stop { background:#e74c3c; color:white; }
    .btn-stop:disabled { background:#bdc3c7; }
    .motivation-msg { margin-top:12px; font-size:15px; font-weight:600; min-height:24px; opacity:0; transition:opacity 0.3s; }
    .motivation-msg.show { opacity:1; }
  </style>
</head>
<body>
<div class="container">
  <h1 style="color:white;text-align:center;">📚 学习计时器</h1>
  <div class="card">
    <div style="font-size:14px;color:#999;" id="statusBadge">⏸ 未开始</div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div>
      <button class="btn btn-start" id="startBtn" onclick="handleStart()">▶ 开始学习</button>
      <button class="btn btn-stop" id="stopBtn" onclick="handleStop()">⏹ 结束学习</button>
    </div>
    <div class="motivation-msg" id="motivationMsg"></div>
  </div>
</div>
<script>
var state={studying:false,startTime:null,timerInterval:null};
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function handleStart(){
  if(state.studying)return;
  state.studying=true;state.startTime=new Date();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('statusBadge').textContent='📖 学习中...';
  var msgs=['加油！💪','元气满满！☀️','冲冲冲！🚀','你可以的！💪','专注当下！🎯'];
  var msg=msgs[Math.floor(Math.random()*msgs.length)];
  var el=document.getElementById('motivationMsg');
  el.textContent=msg;el.className='motivation-msg show';
  setTimeout(function(){el.className='motivation-msg';},3000);
  state.timerInterval=setInterval(function(){
    var e=Math.floor((new Date()-state.startTime)/1000);
    document.getElementById('timerDisplay').textContent=fmt(e);
  },1000);
}
function handleStop(){
  if(!state.studying)return;
  state.studying=false;
  var end=new Date(),dur=Math.floor((end-state.startTime)/1000);
  clearInterval(state.timerInterval);state.timerInterval=null;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
  document.getElementById('statusBadge').textContent='⏸ 未开始';
  var msgs=['辛苦了！🌟','太棒了！👏','自律最帅！😎','每一步都算数！💪','真优秀！⭐'];
  var msg=msgs[Math.floor(Math.random()*msgs.length)];
  var el=document.getElementById('motivationMsg');
  el.textContent=msg;el.className='motivation-msg show';
  setTimeout(function(){el.className='motivation-msg';},3000);
  var s=JSON.parse(localStorage.getItem('studySessions'))||[];
  s.push({start:state.startTime.toISOString(),end:end.toISOString(),duration:dur});
  localStorage.setItem('studySessions',JSON.stringify(s));
  state.startTime=null;
  document.getElementById('timerDisplay').textContent='00:00:00';
}
</script>
</body>
</html>
