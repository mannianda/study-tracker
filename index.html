<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="学习计时器" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f5f7fa" />
  <link rel="manifest" href="manifest.json" />

  <title>学习计时器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; min-height: 100dvh;
      padding: 12px;
      color: #333;
      overscroll-behavior: none;
    }
    .container { max-width: 700px; margin: 0 auto; }

    /* ====== Tabs ====== */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 12px; font-size: 15px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
      transition: all 0.2s; touch-action: manipulation;
    }
    .tab-btn.active { background: white; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ====== Card ====== */
    .card {
      background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 16px;
    }

    /* ====== Timer ====== */
    .timer-card { text-align: center; }
    .timer-display {
      font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: #2c3e50; margin: 12px 0; letter-spacing: 2px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }petBounce { 0%,100% { transform: translateY(0); } 30% { transform: translateY(-20px); } 50% { transform: translateY(-25px); } 70% { transform: translateY(-10px); } }
    @keyframes petFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .pet-accessory { font-size: 28px; position: absolute; top: 5px; }
    .pet-name { font-size: 16px; font-weight: 700; color: #2c3e50; margin-top: 4px; }
    .pet-stage { font-size: 12px; color: #999; }
    .pet-bar-wrap { background: #f0f0f0; border-radius: 10px; height: 8px; margin: 8px 20px; overflow: hidden; }
    .pet-bar { height: 100%; border-radius: 10px; transition: width 0.5s; background: linear-gradient(90deg, #fdcb6e, #e17055); }
    .pet-coins { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 18px; font-weight: 700; color: #f39c12; margin: 8px 0; }
    .pet-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ====== Shop ====== */
    .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .shop-item {
      background: #f8f9fa; border: 2px solid transparent; border-radius: 12px;
      padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .shop-item:hover { border-color: #ddd; }
    .shop-item.owned { border-color: #2ecc71; background: #f0fff4; }
    .shop-item.selected { border-color: #0984e3; background: #e8f4fd; }
    .shop-item .emoji { font-size: 36px; display: block; }
    .shop-item .name { font-size: 12px; font-weight: 600; color: #333; margin-top: 4px; }
    .shop-item .price { font-size: 11px; color: #f39c12; margin-top: 2px; }
    .shop-item .badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-top: 4px; display: inline-block; }
    .badge-owned { background: #2ecc71; color: white; }
    .badge-selected { background: #0984e3; color: white; }
    .badge-locked { background: #ddd; color: #999; }

    /* ====== History ====== */
    .history-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .history-header h2 { font-size: 16px; color: #2c3e50; }
    .session-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
    .session-item:last-child { border-bottom: none; }
    .session-date { font-size: 13px; color: #7f8c8d; }
    .session-duration { font-weight: 600; color: #2c3e50; font-size: 13px; }
    .empty-msg { text-align: center; color: #95a5a6; padding: 24px 0; font-size: 14px; }

    /* ====== Modal ====== */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .modal h3 { margin-bottom: 16px; color: #2c3e50; font-size: 18px; }
    .modal input { width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 16px; outline: none; }
    .modal input:focus { border-color: #3498db; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 480px) {
      body { padding: 8px; }
      .timer-display { font-size: 40px; }
      .btn { padding: 12px 20px; font-size: 14px; min-width: 100px; }
      .pet-emoji { font-size: 64px; }
      .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }
  </style>
</head>

    .btn {

      touch-action: manipulation; user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-start { background: #2ecc71; color: white; }
    .btn-stop { background: #e74c3c; color: white; }
    .btn-stop:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-secondary { background: #ecf0f1; color: #333; }
    .btn-small { padding: 8px 14px; font-size: 13px; min-width: auto; }
    .btn-gold { background: #f39c12; color: white; }
    .btn-pink { background: #e84393; color: white; }
    .btn-blue { background: #0984e3; color: white; }
    .stats { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }

    .stat-label { font-size: 12px; color: #7f8c8d; }
    .stat-value { font-size: 20px; font-weight: 700; color: #2c3e50; }
    .status-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
    .status-studying { background: #d5f5e3; color: #1e8449; }
    .status-idle { background: #f0f0f0; color: #7f8c8d; }
    .motivation-msg { margin-top: 12px; font-size: 15px; font-weight: 600; min-height: 24px; transition: opacity 0.3s; opacity: 0; }
    .motivation-msg.show { opacity: 1; }
    .motivation-msg.start { color: #2ecc71; }
    .motivation-msg.stop { color: #e74c3c; }

    .cal-nav .month { font-size: 16px; font-weight: 700; color: #2c3e50; }
    .cal-nav button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 12px; color: #666; }

    .cal-day.today { background: #e8f4fd; font-weight: 700; }

    .cal-dot.studied { background: #2ecc71; }
    .cal-dot.missed { background: #e74c3c; }
    .cal-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; font-size: 12px; color: #666; }
    .cal-legend span { display: flex; align-items: center; gap: 4px; }
    .cal-summary { text-align: center; margin-top: 12px; font-size: 14px; color: #555; }
