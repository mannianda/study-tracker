<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="学习计时器" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f5f7fa" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  
  
  <title>学习计时器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; min-height: 100dvh;
      padding: 12px;
      color: #333;
      overscroll-behavior: none;
    }
    .container { max-width: 700px; margin: 0 auto; }

    /* ====== Tabs ====== */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 12px; font-size: 15px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
      transition: all 0.2s; touch-action: manipulation;
    }
    .tab-btn.active { background: white; color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ====== Card ====== */
    .card {
      background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 16px;
    }

    /* ====== Timer ====== */
    .timer-card { text-align: center; }
    .timer-display {
      font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: #2c3e50; margin: 12px 0; letter-spacing: 2px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }
    .timer-controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 14px 28px; font-size: 16px; font-weight: 600;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.15s; min-width: 130px;
      touch-action: manipulation; user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-start { background: #2ecc71; color: white; }
    .btn-stop { background: #e74c3c; color: white; }
    .btn-stop:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-secondary { background: #ecf0f1; color: #333; }
    .btn-small { padding: 8px 14px; font-size: 13px; min-width: auto; }
    .btn-gold { background: #f39c12; color: white; }
    .btn-pink { background: #e84393; color: white; }
    .btn-blue { background: #0984e3; color: white; }
    .stats { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
    .stat-item { background: #f8f9fa; border-radius: 12px; padding: 10px 16px; flex: 1; max-width: 160px; }
    .stat-label { font-size: 12px; color: #7f8c8d; }
    .stat-value { font-size: 20px; font-weight: 700; color: #2c3e50; }
    .status-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
    .status-studying { background: #d5f5e3; color: #1e8449; }
    .status-idle { background: #f0f0f0; color: #7f8c8d; }
    .motivation-msg { margin-top: 12px; font-size: 15px; font-weight: 600; min-height: 24px; transition: opacity 0.3s; opacity: 0; }
    .motivation-msg.show { opacity: 1; }
    .motivation-msg.start { color: #2ecc71; }
    .motivation-msg.stop { color: #e74c3c; }

    /* ====== Calendar ====== */
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-nav .month { font-size: 16px; font-weight: 700; color: #2c3e50; }
    .cal-nav button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 12px; color: #666; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .cal-header { font-size: 12px; color: #999; padding: 4px 0; font-weight: 600; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; position: relative; }
    .cal-day.other-month { color: #ddd; }
    .cal-day.today { background: #e8f4fd; font-weight: 700; }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 2px; }
    .cal-dot.studied { background: #2ecc71; }
    .cal-dot.missed { background: #e74c3c; }
    .cal-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; font-size: 12px; color: #666; }
    .cal-legend span { display: flex; align-items: center; gap: 4px; }
    .cal-summary { text-align: center; margin-top: 12px; font-size: 14px; color: #555; }

    /* ====== Pet ====== */
    .pet-area { text-align: center; position: relative; padding: 10px 0; }
    .pet-emoji { font-size: 80px; line-height: 1; transition: transform 0.3s; display: inline-block; }
    .pet-emoji.bounce { animation: petBounce 0.5s; }
    .pet-emoji.idle { animation: petFloat 3s ease-in-out infinite; }
