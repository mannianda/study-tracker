<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="学习计时器" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f5f7fa" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>学习计时器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh; min-height: 100dvh;
      padding: 16px;
      color: #333;
      overscroll-behavior: none;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; font-size: 26px; margin-bottom: 20px; color: #2c3e50; }

    .timer-card {
      background: white; border-radius: 16px; padding: 28px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; margin-bottom: 16px;
    }
    .timer-display {
      font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: #2c3e50; margin: 12px 0; letter-spacing: 2px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }
    .timer-controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      padding: 14px 28px; font-size: 16px; font-weight: 600;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.15s; min-width: 130px;
      touch-action: manipulation;
      user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-start { background: #2ecc71; color: white; }
    .btn-stop { background: #e74c3c; color: white; }
    .btn-stop:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-edit { background: #f39c12; color: white; }
    .btn-secondary { background: #ecf0f1; color: #333; }
    .btn-small { padding: 8px 14px; font-size: 13px; min-width: auto; }
    .btn-danger-outline {
      background: none; border: 1px solid #e74c3c; color: #e74c3c;
      padding: 8px 14px; font-size: 13px; border-radius: 50px; cursor: pointer;
    }

    .stats {
      display: flex; gap: 12px; justify-content: center; margin-top: 20px;
    }
    .stat-item {
      background: #f8f9fa; border-radius: 12px; padding: 10px 16px;
      flex: 1; max-width: 160px;
    }
    .stat-label { font-size: 12px; color: #7f8c8d; }
    .stat-value { font-size: 20px; font-weight: 700; color: #2c3e50; }

    .history-card {
      background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }
    .history-header h2 { font-size: 18px; color: #2c3e50; }
    .history-actions { display: flex; gap: 8px; }
    .empty-msg { text-align: center; color: #95a5a6; padding: 32px 0; font-size: 14px; }

    .session-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid #f0f0f0; gap: 8px;
    }
    .session-item:last-child { border-bottom: none; }
    .session-date { font-size: 13px; color: #7f8c8d; }
    .session-duration { font-weight: 600; color: #2c3e50; white-space: nowrap; }
    .session-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-size: 16px; padding: 6px 8px; border-radius: 8px;
      transition: background 0.2s; touch-action: manipulation;
    }
    .icon-btn:hover { background: #f0f0f0; }
    .icon-btn-danger { color: #e74c3c; }
    .icon-btn-danger:hover { background: #fde8e8; }

    .status-badge {
      display: inline-block; padding: 4px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; margin-top: 8px;
    }
    .status-studying { background: #d5f5e3; color: #1e8449; }
    .status-idle { background: #f0f0f0; color: #7f8c8d; }
    .status-wake-lock { background: #fef9e7; color: #7d6608; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; z-index: 100;
      padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 24px; width: 100%;
      max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .modal h3 { margin-bottom: 16px; color: #2c3e50; font-size: 18px; }
    .modal input {
      width: 100%; padding: 12px 14px; font-size: 16px;
      border: 1px solid #ddd; border-radius: 10px; margin-bottom: 16px;
      outline: none;
    }
    .modal input:focus { border-color: #3498db; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 480px) {
      body { padding: 12px; }
      h1 { font-size: 22px; }
      .timer-card { padding: 20px 16px; }
      .timer-display { font-size: 44px; }
      .btn { padding: 12px 20px; font-size: 15px; min-width: 100px; }
      .stats { gap: 8px; }
      .stat-item { padding: 8px 12px; }
      .stat-value { font-size: 17px; }
      .session-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 学习计时器</h1>

    <div class="timer-card">
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div id="statusBadge" class="status-badge status-idle">⏸ 未开始</div>
      <div style="margin-top:16px;">
        <button class="btn btn-start" id="startBtn">▶ 开始学习</button>
        <button class="btn btn-stop" id="stopBtn" disabled>⏹ 结束学习</button>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-label">今日次数</div>
          <div class="stat-value" id="todayCount">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">今日时长</div>
          <div class="stat-value" id="todayDuration">00:00</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">总计次数</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
      </div>
    </div>

    <div class="history-card">
      <div class="history-header">
        <h2>📋 学习记录</h2>
        <div class="history-actions">
          <button class="btn btn-secondary btn-small" onclick="exportData()">📤 导出</button>
          <button class="btn btn-secondary btn-small" onclick="if(confirm('确定要清空所有记录吗？')){localStorage.removeItem('studySessions');refreshUI();}">🗑 清空</button>
        </div>
      </div>
      <div id="historyList">
        <div class="empty-msg">还没有学习记录，快开始学习吧！🎯</div>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>✏️ 编辑学习时长</h3>
      <input type="number" id="editMinutes" placeholder="输入分钟数" min="1" />
      <div class="modal-actions">
        <button class="btn btn-secondary btn-small" onclick="closeEditModal()">取消</button>
        <button class="btn btn-start btn-small" onclick="confirmEdit()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ====== 状态 ======
    const STORAGE_KEY = 'studySessions';
    let state = { studying: false, startTime: null, timerInterval: null };
    let editingIndex = null;
    let wakeLock = null;

    // ====== 屏幕常亮 ======
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { wakeLock = null; });
          return true;
        }
      } catch(e) { /* 静默失败 */ }
      return false;
    }
    async function releaseWakeLock() {
      if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
    }

    // ====== 数据持久化 ======
    function loadSessions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
    }
    function saveSessions(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    // ====== 格式化 ======
    function formatDuration(sec) {
      const h = String(Math.floor(sec / 3600)).padStart(2, '0');
      const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return h + ':' + m + ':' + s;
    }
    function formatDurationShort(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (h > 0) return h + '时' + m + '分';
      return m + '分' + (sec % 60) + '秒';
    }
    function formatDateTime(iso) {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return d.getMonth()+1 + '/' + d.getDate() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function isToday(iso) {
      const d = new Date(iso);
      const now = new Date();
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
    }

    // ====== UI 刷新 ======
    function updateStats() {
      const sessions = loadSessions();
      const todaySessions = sessions.filter(s => isToday(s.start));
      const totalSec = todaySessions.reduce((sum, s) => sum + (s.duration || 0), 0);
      document.getElementById('todayCount').textContent = todaySessions.length;
      document.getElementById('todayDuration').textContent = formatDurationShort(totalSec);
      document.getElementById('totalCount').textContent = sessions.length;
    }

    function renderHistory() {
      const sessions = loadSessions();
      const list = document.getElementById('historyList');
      if (sessions.length === 0) {
        list.innerHTML = '<div class="empty-msg">还没有学习记录，快开始学习吧！🎯</div>';
        return;
      }
      list.innerHTML = [...sessions].reverse().map((s, i) => {
        const idx = sessions.length - 1 - i;
        const dur = s.duration || 0;
        return '<div class="session-item">' +
          '<span class="session-date">' + formatDateTime(s.start) + '</span>' +
          '<span class="session-duration">' + formatDurationShort(dur) + '</span>' +
          '<div class="session-actions">' +
            '<button class="icon-btn" onclick="openEditModal(' + idx + ')">✏️</button>' +
            '<button class="icon-btn icon-btn-danger" onclick="deleteSession(' + idx + ')">✕</button>' +
          '</div></div>';
      }).join('');
    }

    function refreshUI() {
      updateStats();
      renderHistory();
    }

    // ====== 计时器逻辑 ======
    async function startStudy() {
      if (state.studying) return;
      state.studying = true;
      state.startTime = new Date();
      document.getElementById('startBtn').disabled = true;
      document.getElementById('stopBtn').disabled = false;
      document.getElementById('statusBadge').textContent = '📖 学习中...';
      document.getElementById('statusBadge').className = 'status-badge status-studying';

      // 请求屏幕常亮
      const hasWakeLock = await requestWakeLock();
      if (hasWakeLock) {
        document.getElementById('statusBadge').textContent = '📖 学习中 (屏幕常亮)';
      }

      state.timerInterval = setInterval(() => {
        const elapsed = Math.floor((new Date() - state.startTime) / 1000);
        document.getElementById('timerDisplay').textContent = formatDuration(elapsed);
      }, 1000);
    }

    function stopStudy() {
      if (!state.studying) return;
      state.studying = false;
      const endTime = new Date();
      const duration = Math.floor((endTime - state.startTime) / 1000);
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      releaseWakeLock();

      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('statusBadge').textContent = '⏸ 未开始';
      document.getElementById('statusBadge').className = 'status-badge status-idle';

      const sessions = loadSessions();
      sessions.push({ start: state.startTime.toISOString(), end: endTime.toISOString(), duration });
      saveSessions(sessions);
      state.startTime = null;
      document.getElementById('timerDisplay').textContent = '00:00:00';
      refreshUI();
    }

    // ====== 编辑/删除 ======
    function deleteSession(index) {
      if (!confirm('确定要删除这条记录吗？')) return;
      const sessions = loadSessions();
      sessions.splice(index, 1);
      saveSessions(sessions);
      refreshUI();
    }

    function openEditModal(index) {
      editingIndex = index;
      const sessions = loadSessions();
      const s = sessions[index];
      const minutes = Math.round((s.duration || 0) / 60);
      document.getElementById('editMinutes').value = minutes || '';
      document.getElementById('editModal').classList.add('active');
      setTimeout(() => document.getElementById('editMinutes').focus(), 100);
    }
    function closeEditModal() {
      editingIndex = null;
      document.getElementById('editModal').classList.remove('active');
    }
    function confirmEdit() {
      const minutes = parseInt(document.getElementById('editMinutes').value);
      if (isNaN(minutes) || minutes < 1) { alert('请输入有效的分钟数'); return; }
      const sessions = loadSessions();
      sessions[editingIndex].duration = minutes * 60;
      saveSessions(sessions);
      closeEditModal();
      refreshUI();
    }

    // ====== 导出 ======
    function exportData() {
      const sessions = loadSessions();
      if (sessions.length === 0) { alert('暂无学习记录可以导出'); return; }
      let text = '学习记录\n' + '='.repeat(30) + '\n';
      sessions.forEach((s, i) => {
        text += (i+1) + '. ' + formatDateTime(s.start) + ' - ' + formatDurationShort(s.duration) + '\n';
      });
      const total = sessions.reduce((sum, s) => sum + (s.duration || 0), 0);
      text += '='.repeat(30) + '\n总计：' + formatDurationShort(total) + '，共' + sessions.length + '次';
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '学习记录_' + new Date().toISOString().slice(0,10) + '.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ====== 事件绑定 ======
    document.getElementById('startBtn').addEventListener('click', startStudy);
    document.getElementById('stopBtn').addEventListener('click', stopStudy);
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeEditModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeEditModal();
    });
    document.getElementById('editMinutes').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') confirmEdit();
    });

    // ====== Service Worker 注册 ======
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ====== 初始化 ======
    refreshUI();
  </script>
</body>
</html>
