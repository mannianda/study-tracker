<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>学习计时器</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:12px;color:#333}.container{max-width:480px;margin:0 auto}.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:16px;text-align:center}.timer{font-size:48px;font-weight:700;color:#2c3e50;margin:12px 0;font-family:monospace}.btn{padding:14px 28px;font-size:16px;font-weight:600;border:none;border-radius:50px;cursor:pointer;min-width:120px}.btn-s{background:#2ecc71;color:#fff}.btn-p{background:#e74c3c;color:#fff}.btn-p:disabled{background:#bdc3c7}.msg{margin-top:12px;font-size:15px;font-weight:600;min-height:24px;opacity:0;transition:opacity .3s}.msg.s{opacity:1}</style></head><body><div class=container><h1 style="color:#fff;text-align:center">📚 学习计时器</h1><div class=card><div id=s style="font-size:14px;color:#999">⏸ 未开始</div><div class=timer id=t>00:00:00</div><div><button class="btn btn-s" id=btn1 onclick="hs()">▶ 开始学习</button><button class="btn btn-p" id=btn2 onclick="hp()">⏹ 结束学习</button></div><div class=msg id=m></div></div></div><script>var st={a:!1,s:null,i:null};function hs(){if(st.a)return;st.a=!0;st.s=new Date;btn1.disabled=!0;btn2.disabled=!1;s.textContent="📖 学习中...";var r=["加油！💪","元气满满！☀️","冲冲冲！🚀","你可以的！💪"],w=r[Math.random()*r.length|0];m.textContent=w;m.className="msg s";setTimeout(function(){m.className="msg"},3e3);st.i=setInterval(function(){var e=(new Date-st.s)/1e3|0;t.textContent=String(~~(e/3600)).padStart(2,"0")+":"+String(~~(e%3600/60)).padStart(2,"0")+":"+String(e%60).padStart(2,"0")},1e3)}function hp(){if(!st.a)return;st.a=!1;var e=new Date,n=(e-st.s)/1e3|0;clearInterval(st.i);st.i=null;btn1.disabled=!1;btn2.disabled=!0;s.textContent="⏸ 未开始";var r=["辛苦了！🌟","太棒了！👏","自律最帅！😎","每一步都算数！💪"],w=r[Math.random()*r.length|0];m.textContent=w;m.className="msg s";setTimeout(function(){m.className="msg"},3e3);var a=JSON.parse(localStorage.getItem("s"))||[];a.push({start:st.s.toISOString(),end:e.toISOString(),duration:n});localStorage.setItem("s",JSON.stringify(a));st.s=null;t.textContent="00:00:00"}</script></body></html>
