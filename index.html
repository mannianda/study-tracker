<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>学习计时器</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:12px;color:#333}.container{max-width:480px;margin:0 auto}.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:16px;text-align:center}.timer{font-size:48px;font-weight:700;color:#2c3e50;margin:12px 0;font-family:monospace}.btn{padding:14px 28px;font-size:16px;font-weight:600;border:none;border-radius:50px;cursor:pointer;min-width:120px}.btn-s{background:#2ecc71;color:#fff}.btn-p{background:#e74c3c;color:#fff}.btn-p:disabled{background:#bdc3c7}.msg{margin-top:12px;font-size:15px;font-weight:600;min-height:24px;opacity:0;transition:opacity .3s}.msg.s{opacity:1}.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.cal-nav .month{font-size:16px;font-weight:700;color:#2c3e50}.cal-nav button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 12px;color:#666}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}.cal-header{font-size:12px;color:#999;padding:4px 0;font-weight:600}.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px}.cal-day.other-month{color:#ddd}.cal-day.today{background:#e8f4fd;font-weight:700}.cal-dot{width:6px;height:6px;border-radius:50%;margin-top:2px}.cal-dot.studied{background:#2ecc71}.cal-dot.missed{background:#e74c3c}.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:12px;color:#666}.cal-summary{text-align:center;margin-top:8px;font-size:12px;color:#999}</style></head><body><div class=container><h1 style="color:#fff;text-align:center">📚 学习计时器</h1><div class=card><div id=s style="font-size:14px;color:#999">⏸ 未开始</div><div class=timer id=t>00:00:00</div><div><button class="btn btn-s" id=btn1 onclick="hs()">▶ 开始学习</button><button class="btn btn-p" id=btn2 onclick="hp()">⏹ 结束学习</button></div><div class=msg id=m></div>      <div class="card">
        <div class="cal-nav">
          <button onclick="cp()">◀</button>
          <span class="month" id="calMonth"></span>
          <button onclick="cn()">▶</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <span><span class="cal-dot studied" style="display:inline-block;vertical-align:middle"></span> 已学习</span>
          <span><span class="cal-dot missed" style="display:inline-block;vertical-align:middle"></span> 未学习</span>
        </div>
        <div class="cal-summary" id="calSummary"></div>
      </div></div></div><script>var st={a:!1,s:null,i:null};function hs(){if(st.a)return;st.a=!0;st.s=new Date;btn1.disabled=!0;btn2.disabled=!1;s.textContent="📖 学习中...";var r=["加油！💪","元气满满！☀️","冲冲冲！🚀","你可以的！💪"],w=r[Math.random()*r.length|0];m.textContent=w;m.className="msg s";setTimeout(function(){m.className="msg"},3e3);st.i=setInterval(function(){var e=(new Date-st.s)/1e3|0;t.textContent=String(~~(e/3600)).padStart(2,"0")+":"+String(~~(e%3600/60)).padStart(2,"0")+":"+String(e%60).padStart(2,"0")},1e3)}function hp(){if(!st.a)return;st.a=!1;var e=new Date,n=(e-st.s)/1e3|0;clearInterval(st.i);st.i=null;btn1.disabled=!1;btn2.disabled=!0;s.textContent="⏸ 未开始";var r=["辛苦了！🌟","太棒了！👏","自律最帅！😎","每一步都算数！💪"],w=r[Math.random()*r.length|0];m.textContent=w;m.className="msg s";setTimeout(function(){m.className="msg"},3e3);var a=JSON.parse(localStorage.getItem("s"))||[];a.push({start:st.s.toISOString(),end:e.toISOString(),duration:n});localStorage.setItem("s",JSON.stringify(a));st.s=null;t.textContent="00:00:00"}
var cd=new Date;
function gd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function rc(){
  var y=cd.getFullYear(),m=cd.getMonth();
  document.getElementById('calMonth').textContent=y+'年'+(m+1)+'月';
  var s=JSON.parse(localStorage.getItem('s'))||[];
  var study={};s.forEach(function(x){study[gd(new Date(x.start))]=1});
  var h='<div class="cal-header">日</div><div class="cal-header">一</div><div class="cal-header">二</div><div class="cal-header">三</div><div class="cal-header">四</div><div class="cal-header">五</div><div class="cal-header">六</div>';
  var first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  var today=new Date(),todayStr=gd(today),studiedCount=0;
  for(var i=0;i<first;i++)h+='<div class="cal-day other-month"></div>';
  for(var d=1;d<=last;d++){
    var date=new Date(y,m,d),ds=gd(date);
    var cls='cal-day';if(ds===todayStr)cls+=' today';
    var dot='';if(study[ds]){dot='<div class="cal-dot studied"></div>';studiedCount++}else if(ds!==todayStr&&ds<todayStr){dot='<div class="cal-dot missed"></div>'}
    h+='<div class="'+cls+'">'+d+dot+'</div>';
  }
  document.getElementById('calGrid').innerHTML=h;
  document.getElementById('calSummary').textContent='本月学习 '+studiedCount+' 天';
}
function cp(){cd.setMonth(cd.getMonth()-1);rc()}
function cn(){cd.setMonth(cd.getMonth()+1);rc()}rc();</script></body></html>
